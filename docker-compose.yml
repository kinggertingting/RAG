services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      -m /models/qwen2.5-1.5b-q4.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 4096
    restart: unless-stopped
    networks:
      - rag-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - rag-network

  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - LLM_BASE_URL=http://llama-server:8080/v1
      - QDRANT_URL=http://qdrant:6333
    command: uvicorn api.api:app --host 0.0.0.0 --port 8000
    depends_on:
      - llama-server
      - qdrant
    restart: unless-stopped
    networks:
      - rag-network

  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  qdrant_storage:

networks:
  rag-network: